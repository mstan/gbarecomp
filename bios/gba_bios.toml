# ── SWI branch table ────────────────────────────────────────────────
# The BIOS SWI dispatcher at swi_vector (0x140) loads from this
# table to jump to the per-SWI handler. Entries are ABS32 with
# the standard ARM/THUMB interworking convention: bit 0 of each
# entry encodes mode (set = THUMB, clear = ARM).
# Size derived from the disasm layout: 43 SWIs × 4 bytes = 0xAC.

[[jump_table]]
addr         = 0x000001C8
stride       = 4
count        = 43
format       = "abs32"
entries_mode = "auto"  # bit 0 of entry encodes mode
name         = "swi_branch_table"
note         = "BIOS SWI dispatch table — SWI 0x00..0x2A"

[[jump_table]]
addr         = 0x00003738
stride       = 4
count        = 30
format       = "abs32"
entries_mode = "auto"  # bit 0 of entry encodes mode
name         = "bios_intro_command_table"
note         = "BIOS intro command handlers; opcodes 0xB1..0xCE"

# IntrWait/Halt resume points dispatched on exception (IRQ/SWI) return with an
# empty C call-return stack — mid-function addresses the recompiler doesn't seed
# as entries on its own. Seeding them makes IntrWait fully static instead of
# interpreter-bridged. Source: FireRed dispatch-miss log 2026-06-19.
[[extra_func]]
addr = 0x00000BD4
mode = "arm"
name = "bios_intrwait_resume_0BD4"
note = "IntrWait/Halt resume; mid-fn of swi_branch_table_12@0xBC4 (FireRed miss-log)"

[[extra_func]]
addr = 0x00000C0C
mode = "arm"
name = "bios_resume_0C0C"
note = "exception-return resume; mid-fn of 0x00000C04 (FireRed miss-log)"

# Additional exception-return PCs observed while booting Mega Man Zero through
# the real BIOS.  Disassembly confirms each address is inside the named host
# function, so these must be resume aliases rather than standalone functions.
[[extra_func]]
