# gba_bios.toml — per-binary recompile config for the GBA BIOS.
#
# Generated by tools/import_bios_symbols/import_bios_symbols.py
# from third_party/gba_bios_disasm (camthesaxman/gba_bios).
# Re-run the importer instead of hand-editing.
#
# See docs/TOML_SCHEMA.md for the schema reference.

[program]
name         = "GBA BIOS"
id           = "gba_bios"
load_address = 0x00000000
size         = 0x00004000  # 16 KB
entry_pc     = 0x00000000

[identity]
sha1 = "300c20df6731a33952ded8c436f7f186d25d3492"
md5  = "a860e8c0b6d573d191e4ec7db1b1e4f6"

# ── Function entries ────────────────────────────────────────────────
# Imported from the disasm's ELF symbol table (arm-none-eabi-nm).
# Auto-generated `_NNNNNNNN` basic-block labels are filtered out;
# only deliberately-named labels survive. Plus a hand-coded
# tail of exception-vector slots (0x08 SWI, 0x18 IRQ) that the
# runtime dispatches separately even though the disasm groups
# them under a single `_start` label.

